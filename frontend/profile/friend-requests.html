<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявки в друзья</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .container h2 {
            color: #9b59b6;
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-back {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background-color: #95a5a6;
        }

        .requests-count {
            background-color: #9b59b6;
            color: white;
            font-size: 16px;
            padding: 6px 12px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .request-card {
            background: #fff;
            border-radius: 10px;
            padding: 15px 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            transition: transform 0.2s ease;
        }

        .request-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }

        .request-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 15px;
            flex-shrink: 0;
            background-color: #eee;
        }

        .request-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .request-info {
            flex-grow: 1;
        }

        .request-info h5 {
            margin: 0 0 4px;
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        .request-info p {
            margin: 0;
            color: #777;
            font-size: 13px;
        }

        .request-actions {
            display: flex;
            gap: 10px;
        }

        .request-actions button {
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-accept {
            background-color: #2ecc71;
            color: white;
        }

        .btn-accept:hover {
            background-color: #27ae60;
        }

        .btn-decline {
            background-color: transparent;
            color: #e74c3c;
            border: 2px solid #e74c3c !important;
        }

        .btn-decline:hover {
            background-color: #e74c3c;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: #9b59b6;
            border-radius: 10px;
            color: white;
            display: none;
        }

        .empty-state p {
            font-size: 18px;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Заявки в друзья</h2>
    <button onclick="window.location.href='/profile/listProfile.html'" class="btn-back">← Назад</button>

    <div>
        <span class="requests-count" id="requests-count">0 заявок</span>
    </div>

    <div id="requests-list"></div>

    <div class="empty-state" id="empty-state">
        <p>Новых заявок в друзья нет</p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadRequests);

    async function loadRequests() {
        const token = localStorage.getItem('access');
        const list = document.getElementById('requests-list');
        const emptyState = document.getElementById('empty-state');
        const countBadge = document.getElementById('requests-count');

        try {
            const response = await fetch('/api/users/friend-requests', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!response.ok) throw new Error('Ошибка загрузки заявок');

            const requests = await response.json();
            countBadge.textContent = `${requests.length} заявок`;
            list.innerHTML = '';

            if (requests.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            requests.forEach(user => {
                const card = document.createElement('div');
                card.className = 'request-card';
                card.id = `card-${user.id}`;
                card.innerHTML = `
                    <div class="request-avatar">
                        <img src="${user.avatarUrl || '/images/avatar-placeholder.svg'}" alt="Avatar">
                    </div>
                    <div class="request-info">
                        <h5>${user.username}</h5>
                        <p>@${user.username}</p>
                    </div>
                    <div class="request-actions">
                        <button class="btn-accept" onclick="acceptRequest(${user.id}, '${user.username}')">Принять</button>
                        <button class="btn-decline" onclick="declineRequest(${user.id}, '${user.username}')">Отклонить</button>
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (error) {
            console.error(error);
            list.innerHTML = '<p style="text-align:center; color:red;">Не удалось загрузить заявки.</p>';
        }
    }

    async function acceptRequest(requesterId, username) {
        const token = localStorage.getItem('access');
        try {
            const response = await fetch(`/api/users/${requesterId}/accept-request`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                removeCard(requesterId);
                updateCount(-1);
            } else {
                const data = await response.json().catch(() => null);
                alert(data?.message || 'Ошибка при принятии заявки');
            }
        } catch (error) {
            console.error(error);
            alert('Ошибка при принятии заявки');
        }
    }

    async function declineRequest(requesterId, username) {
        if (!confirm(`Отклонить заявку от ${username}?`)) return;
        const token = localStorage.getItem('access');
        try {
            const response = await fetch(`/api/users/${requesterId}/decline-request`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                removeCard(requesterId);
                updateCount(-1);
            } else {
                const data = await response.json().catch(() => null);
                alert(data?.message || 'Ошибка при отклонении заявки');
            }
        } catch (error) {
            console.error(error);
            alert('Ошибка при отклонении заявки');
        }
    }

    function removeCard(userId) {
        const card = document.getElementById(`card-${userId}`);
        if (card) card.remove();

        const remaining = document.querySelectorAll('.request-card').length;
        if (remaining === 0) {
            document.getElementById('empty-state').style.display = 'block';
        }
    }

    function updateCount(delta) {
        const badge = document.getElementById('requests-count');
        const current = parseInt(badge.textContent) || 0;
        badge.textContent = `${Math.max(0, current + delta)} заявок`;
    }
</script>
</body>
</html>
