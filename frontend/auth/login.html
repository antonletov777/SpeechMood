<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f4f9;
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #fff;
            border-radius: 10px;
            padding: 35px;
            text-align: center;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .login-container h2 {
            margin-bottom: 20px;
            font-size: 30px;
            color: rgb(19, 13, 25);
        }

        .login-container label {
            display: block;
            font-size: 16px;
            text-align: left;
            margin-bottom: 5px;
        }

        .login-container input {
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        .login-container .login-class button {
            background-color: #287233;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
        }

        .login-container .login-class button:hover {
            background-color: #2D572C;
        }

        .login-container .register-class button {
            background-color: #b22222;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-top: 5px;
        }

        .login-container .register-class button:hover {
            background-color: #8b0000;
        }

        .error {
            color: red;
            font-size: 16px;
            margin-bottom: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-container">
        <h2>Войти</h2>
        <div class="error" id="error"></div>
        <form id="login-form">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>

            <div class="login-class">
                <button type="submit">Войти</button>
            </div>

            <div class="register-class">
                <button type="button" onclick="window.location.href='/auth/register.html'">Регистрация</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        document.getElementById('error').textContent = '';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            if (response.ok) {
                const data = await response.json();

                localStorage.setItem('access', data.accessToken || data.access);
                if (data.refreshToken || data.refresh) {
                    localStorage.setItem('refresh', data.refreshToken || data.refresh);
                }
                localStorage.setItem('username', username);

                window.location.href = '/auth/index.html';
            } else {
                try {
                    const errorData = await response.json();
                    document.getElementById('error').textContent = errorData.message || 'Имя пользователя или пароль неверны';
                } catch (e) {
                    document.getElementById('error').textContent = 'Имя пользователя или пароль неверны';
                }
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('error').textContent = 'Ошибка соединения с сервером';
        }
    });
</script>
</body>
</html>
