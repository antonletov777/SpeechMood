<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сменить пароль</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f9; }

        .change-password-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #3498db;
        }

        .login-container label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #555;
        }

        .login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .login-container button {
            background-color: #287233;
            color: #fff;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .login-container button:hover {
            background-color: #2D572C;
        }

        .login-container .btn-back {
            margin-top: 10px;
            background-color: #7f8c8d;
        }

        .login-container .btn-back:hover {
            background-color: #95a5a6;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="change-password-page">
    <div class="login-container">
        <h2>Сменить пароль</h2>

        <div class="error" id="error"></div>
        <form id="change-password-form">
            <label for="old-password">Старый пароль:</label>
            <input type="password" id="old-password" required>

            <label for="new-password">Новый пароль:</label>
            <input type="password" id="new-password" required>

            <label for="confirm-password">Подтвердите новый пароль:</label>
            <input type="password" id="confirm-password" required>

            <button type="submit">Сменить пароль</button>
            <button type="button" class="btn-back" onclick="history.back()">← Назад</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('change-password-form').addEventListener('submit', async function(event) {
        event.preventDefault();

        const oldPassword = document.getElementById('old-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
            alert('Новый пароль и подтверждение пароля не совпадают.');
            return;
        }

        const accessToken = localStorage.getItem('access');

        if (!accessToken) {
            alert('Вы не авторизованы.');
            return;
        }

        try {
            const response = await fetch('/api/users/change-password', {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    oldPassword: oldPassword,
                    newPassword: newPassword
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => null);
                throw new Error(errorData?.message || 'Ошибка при смене пароля');
            }

            alert('Пароль успешно обновлен');
            window.location.href = '/index.html';

        } catch (error) {
            console.error(error);
            alert(error.message);
        }
    });
</script>
</body>
</html>
