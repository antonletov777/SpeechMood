<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента новостей | SpeechMood</title>


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #edeef0;
            color: #333;
            padding-top: 60px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
        }

        .top-bar-content {
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #2787F5;
            text-decoration: none;
        }

        .logout-btn {
            background-color: transparent;
            color: #828282;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-btn:hover {
            color: #333;
        }

        .main-layout {
            max-width: 960px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
            padding: 0 15px;
        }

        .left-sidebar {
            width: 160px;
            flex-shrink: 0;
            position: sticky;
            top: 70px;
            align-self: flex-start;
        }

        .side-menu {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .side-menu a {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            padding: 8px 10px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .side-menu a:hover {
            background-color: #e1e3e6;
        }

        .side-menu a i {
            width: 20px;
            color: #2787F5;
            margin-right: 10px;
            text-align: center;
            font-size: 16px;
        }

        .feed-container {
            flex-grow: 1;
            max-width: 600px;
        }

        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            padding: 15px;
            margin-bottom: 15px;
        }

        .create-post-block textarea {
            width: 100%;
            border: none;
            resize: none;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            min-height: 40px;
            padding-bottom: 10px;
        }

        .create-post-actions {
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #f1f1f1;
            padding-top: 10px;
        }

        .send-btn {
            background-color: #2787F5;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        .send-btn:hover {
            background-color: #1e6ac2;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .post-author {
            font-weight: 600;
            color: #2a5885;
            font-size: 14px;
        }

        .post-date {
            font-size: 12px;
            color: #818c99;
            margin-top: 2px;
        }

        .post-content p {
            margin: 0 0 15px 0;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .post-actions {
            border-top: 1px solid #f1f1f1;
            padding-top: 10px;
            display: flex;
            gap: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #818c99;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #515c69;
        }

        .action-btn.liked {
            color: #ff3347;
        }

        .delete-btn {
            color: #99a2ad;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .delete-btn:hover {
            color: #e74c3c;
        }

        .comment-section {
            display: none;
            margin-top: 15px;
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
        }

        .comment-section.visible {
            display: block;
        }

        .comment {
            margin-bottom: 10px;
            font-size: 13px;
        }

        .comment strong {
            color: #2a5885;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .comment-input-wrapper textarea {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #d3d9de;
            border-radius: 4px;
            resize: none;
            font-family: inherit;
        }

        .loading {
            text-align: center;
            color: #818c99;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="top-bar-content">
        <a href="/auth/index.html" class="logo">SpeechMood</a>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
</header>


<div class="main-layout">
    <aside class="left-sidebar">
        <nav class="side-menu">
            <a href="/profile.html"><i class="fas fa-user-circle"></i> Моя страница</a>
            <a href="/auth/index.html"><i class="fas fa-newspaper"></i> Лента</a>
            <a href="/messages.html"><i class="fas fa-comment-alt"></i> Сообщения</a>
            <a href="/friends.html"><i class="fas fa-user-friends"></i> Друзья</a>
            <a href="/groups.html"><i class="fas fa-users"></i> Группы</a>
        </nav>
    </aside>

    <main class="feed-container">

        <div class="card create-post-block">
            <textarea id="post-content" rows="2" placeholder="Что у вас нового?"></textarea>
            <div class="create-post-actions">
                <button class="send-btn" onclick="submitPost()">Опубликовать</button>
            </div>
        </div>

        <div id="post-feed">
            <p class="loading">Загрузка постов...</p>
        </div>

    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const accessToken = localStorage.getItem('access');

        if (accessToken) {
            setTimeout(() => {
                loadPosts();
            }, 300);
        } else {
            window.location.href = '/login.html';
        }
    });

    async function logout() {
        const accessToken = localStorage.getItem('access');
        if (accessToken) {
            try {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    }
                });
            } catch (e) {
                console.error(e);
            }
        }
        localStorage.removeItem('access');
        localStorage.removeItem('refresh');
        localStorage.removeItem('username');
        window.location.href = '/login.html';
    }

    async function loadPosts() {
        const accessToken = localStorage.getItem('access');

        if (!accessToken) {
            window.location.href = '/login.html';
            return;
        }

        const postFeed = document.getElementById('post-feed');
        postFeed.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка постов...</p>';

        try {
            const response = await fetch('/api/posts', {
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            });

            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('access');
                window.location.href = '/login.html';
                return;
            }

            if (!response.ok) {
                throw new Error('Ошибка загрузки постов. Статус: ' + response.status);
            }

            const data = await response.json();
            const posts = data.results || data;

            if (posts.length === 0) {
                postFeed.innerHTML = '<div class="card" style="text-align:center; color:#818c99;">Пока нет ни одного поста. Напишите что-нибудь!</div>';
                return;
            }

            postFeed.innerHTML = '';

            posts.forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'card';

                const authorName = post.author ? post.author.username : 'Автор неизвестен';
                const postDate = post.published ? new Date(post.published).toLocaleString([], {hour: '2-digit', minute:'2-digit', day: '2-digit', month: 'short'}) : '';

                postDiv.innerHTML = `
                    <div class="post-header">
                        <div>
                            <div class="post-author">${authorName}</div>
                            <div class="post-date">${postDate}</div>
                        </div>
                        ${authorName === localStorage.getItem("username") ? `
                            <button class="delete-btn" onclick="deletePost(${post.id})" title="Удалить пост"><i class="fas fa-times"></i></button>
                        ` : ''}
                    </div>

                    <div class="post-content">
                        <p>${post.content}</p>
                    </div>

                    <div class="post-actions">
                        <button class="action-btn ${post.user_liked ? 'liked' : ''}" data-post-id="${post.id}">
                            <i class="${post.user_liked ? 'fas' : 'far'} fa-heart"></i> <span class="like-counter">${post.likes || 0}</span>
                        </button>
                        <button class="action-btn comment-btn">
                            <i class="far fa-comment"></i> Комментировать
                        </button>
                    </div>

                    <div class="comment-section" id="comments-${post.id}"></div>
                `;

                postDiv.querySelector('.action-btn[data-post-id]').addEventListener('click', (e) => {
                    toggleLike(post.id, e.currentTarget);
                });

                postDiv.querySelector('.comment-btn').addEventListener('click', () => {
                    openComments(post.id);
                });

                postFeed.appendChild(postDiv);
            });

        } catch (error) {
            console.error(error);
            postFeed.innerHTML = '<div class="card" style="text-align:center; color:#e74c3c;">Ошибка загрузки постов.</div>';
        }
    }

    async function toggleLike(postId, button) {
        const accessToken = localStorage.getItem('access');
        try {
            const response = await fetch(`/api/posts/${postId}/like`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error();

            const data = await response.json();

            button.classList.toggle('liked', data.liked);
            const icon = button.querySelector('i');
            if (data.liked) {
                icon.classList.remove('far');
                icon.classList.add('fas');
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
            }
            button.querySelector('.like-counter').textContent = data.likes;

        } catch (error) {
            console.error(error);
        }
    }

    async function openComments(postId) {
        const commentsContainer = document.getElementById(`comments-${postId}`);

        if (commentsContainer.classList.contains('visible')) {
            commentsContainer.classList.remove('visible');
            return;
        }

        commentsContainer.classList.add('visible');

        if (commentsContainer.dataset.loaded === 'true') {
            return;
        }

        const accessToken = localStorage.getItem('access');
        commentsContainer.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i></p>';

        try {
            const postResponse = await fetch(`/api/posts/${postId}`, {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            });

            if (!postResponse.ok) throw new Error('Ошибка при получении поста');

            const postData = await postResponse.json();
            const comments = postData.comments;

            commentsContainer.innerHTML = '';

            if (!comments || comments.length === 0) {
                commentsContainer.innerHTML = '<p style="color:#818c99; font-size: 13px;">Комментариев пока нет.</p>';
            } else {
                comments.forEach(comment => {
                    const authorName = comment.author?.username || 'Аноним';
                    const commentDiv = document.createElement('div');
                    commentDiv.className = 'comment';
                    commentDiv.innerHTML = `<strong>${authorName}</strong> <span style="color:#818c99; margin-left:5px;">написал:</span><p style="margin: 5px 0;">${comment.content}</p>`;
                    commentsContainer.appendChild(commentDiv);
                });
            }

            commentsContainer.innerHTML += getCommentFormHtml(postId);
            commentsContainer.dataset.loaded = 'true';

        } catch (error) {
            console.error('Ошибка загрузки комментариев:', error);
            commentsContainer.innerHTML = '<p style="color:#e74c3c;">Не удалось загрузить комментарии.</p>';
        }
    }

    function getCommentFormHtml(postId) {
        return `
            <div class="comment-input-wrapper">
                <textarea id="new-comment-${postId}" rows="1" placeholder="Написать комментарий..."></textarea>
                <button class="send-btn" onclick="sendComment(${postId})"><i class="fas fa-paper-plane"></i></button>
            </div>
        `;
    }

    async function sendComment(postId) {
        const accessToken = localStorage.getItem('access');
        const textarea = document.getElementById(`new-comment-${postId}`);
        const content = textarea.value.trim();

        if (!content) return;

        try {
            const body = {
                content: content,
                post: postId
            };

            const response = await fetch('/api/messages/create', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!response.ok) throw new Error();

            textarea.value = '';
            const commentsContainer = document.getElementById(`comments-${postId}`);
            if (commentsContainer) {
                commentsContainer.dataset.loaded = 'false';
            }

            await openComments(postId);

        } catch (error) {
            console.error(error);
            alert('Не удалось отправить комментарий');
        }
    }

    async function submitPost() {
        const textarea = document.getElementById('post-content');
        const content = textarea.value.trim();
        const accessToken = localStorage.getItem('access');

        if (!content) return;

        try {
            const response = await fetch('/api/posts/create', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content: content })
            });

            if (!response.ok) throw new Error();

            textarea.value = '';
            await loadPosts();

        } catch (error) {
            console.error(error);
            alert('Не удалось создать пост');
        }
    }

    async function deletePost(postId) {
        const accessToken = localStorage.getItem('access');
        if (!confirm('Вы уверены, что хотите удалить этот пост?')) return;

        try {
            const response = await fetch(`/api/posts/${postId}/delete`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error();

            await loadPosts();

        } catch (error) {
            console.error(error);
            alert('Не удалось удалить пост');
        }
    }
</script>
</body>
</html>
