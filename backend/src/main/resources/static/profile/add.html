<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подписаться на пользователя</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }

        .profiles-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .profiles-container h2 {
            text-align: center;
            color: #3498db;
            margin-bottom: 30px;
            font-size: 30px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .profile-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .profile-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            background-color: #eee;
        }

        .profile-card h5 {
            margin: 10px 0 5px;
            color: #333;
        }

        .profile-card p {
            color: #666;
            margin-bottom: 15px;
        }

        .profile-card a,
        .profile-card button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            box-sizing: border-box;
        }

        .profile-card a {
            background-color: #3498db;
            color: white;
        }

        .profile-card a:hover {
            background-color: #2980b9;
        }

        .profile-card button {
            background-color: #2ecc71;
            color: white;
        }

        .profile-card button:hover {
            background-color: #27ae60;
        }

        .btn-back {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background-color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="profiles-container">
    <h2>Подписаться на пользователя</h2>
    <button onclick="history.back()" class="btn-back">← Назад</button>

    <div class="profile-grid" id="profile-grid"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadProfiles);

    async function loadProfiles() {
        const token = localStorage.getItem('access');
        const grid = document.getElementById('profile-grid');
        const currentUsername = localStorage.getItem('username');

        try {
            const response = await fetch('/api/users', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!response.ok) throw new Error('Ошибка загрузки пользователей');

            const users = await response.json();
            grid.innerHTML = '';

            users.forEach((user) => {
                // 1. Исключаем текущего пользователя из списка
                if (user.username === currentUsername) return;

                const card = document.createElement('div');
                card.className = 'profile-card';
                card.innerHTML = `
                <img src="/images/avatar-placeholder.png" alt="Avatar">
                <h5>${user.username}</h5>
                <p>@${user.username}</p>
                <a href="/profile/detail.html?id=${user.id}">Профиль</a>
                <button id="btn-${user.id}" onclick="followUser(${user.id}, '${user.username}')">Подписаться</button>
            `;
                grid.appendChild(card);

                updateButtonStatus(user.id);
            });
        } catch (error) {
            console.error("Ошибка загрузки:", error);
        }
    }

    async function updateButtonStatus(userId) {
        const token = localStorage.getItem('access');
        try {
            const response = await fetch(`/api/users/${userId}/status`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            const btn = document.getElementById(`btn-${userId}`);

            if (!btn) return;

            if (data.status === 'ACCEPTED') {
                btn.textContent = "Вы друзья";
                btn.disabled = true;
                btn.style.backgroundColor = "#95a5a6";
            } else if (data.status === 'PENDING') {
                btn.textContent = "Заявка отправлена";
                btn.disabled = true;
                btn.style.backgroundColor = "#f39c12";
            }
        } catch (error) {
            console.error("Ошибка получения статуса:", error);
        }
    }

    async function updateButtonStatus(userId) {
        const token = localStorage.getItem('access');
        const response = await fetch(`/api/users/${userId}/status`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await response.json();
        const btn = document.getElementById(`btn-${userId}`);

        if (data.status === 'PENDING') {
            btn.textContent = "Заявка отправлена";
            btn.disabled = true;
            btn.style.backgroundColor = "#f39c12";
        } else if (data.status === 'ACCEPTED') {
            btn.textContent = "Вы друзья";
            btn.disabled = true;
            btn.style.backgroundColor = "#95a5a6";
        }
    }

    async function followUser(userId, username) {
        if (!confirm(`Добавить ${username} в подписки?`)) return;

        const token = localStorage.getItem('access');

        try {
            const response = await fetch(`/api/users/${userId}/follow`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                location.reload();
            } else {
                const errorData = await response.json().catch(() => null);
                alert(errorData?.message || 'Произошла ошибка при добавлении');
            }
        } catch (error) {
            console.error(error);
            alert('Произошла ошибка при добавлении');
        }
    }
</script>
</body>
</html>
