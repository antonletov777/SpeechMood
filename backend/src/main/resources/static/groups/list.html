<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои группы</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }

        .groups-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .groups-container h2 {
            color: #3498db;
            font-size: 35px;
            text-align: center;
            margin-bottom: 20px;
        }

        .groups-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-create {
            background-color: #2ecc71;
            color: white;
            font-size: 14px;
            padding: 8px 18px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            margin-bottom: 10px;
            border: none;
            cursor: pointer;
        }

        .btn-create:hover {
            background-color: rgb(30, 124, 69);
        }

        .btn-back {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-back:hover {
            background-color: #95a5a6;
        }

        .groups-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .groups-stats .badge {
            background-color: #3498db;
            color: white;
            font-size: 18px;
            padding: 6px 10px;
            border-radius: 5px;
        }

        .group-card {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            transition: transform 0.2s ease;
            margin-bottom: 15px;
        }

        .group-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .group-info {
            flex-grow: 1;
        }

        .group-info h5 {
            margin-top: 0px;
            margin-bottom: 0px;
            color: #333;
            font-weight: 600;
            font-size: 20px;
        }

        .group-info h6 {
            margin-top: 15px;
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }

        .group-info p {
            margin: 0;
            color: #777;
            font-size: 14px;
        }

        .group-actions a {
            font-size: 15px;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            color: #3498db;
            border: 2px solid #3498db;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: inline-block;
        }

        .group-actions a:hover {
            background-color: #3498db;
            color: white;
        }

        .empty-groups {
            text-align: center;
            padding: 50px 20px;
            background: #3498db;
            border-radius: 10px;
            color: white;
            display: none;
        }

        .empty-groups i {
            font-size: 60px;
            color: #2980b9;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="groups-container">
    <h2>Мои группы</h2>

    <div class="groups-header">
        <button onclick="window.location.href='/auth/index.html'" class="btn-back">← Назад</button>
        <button onclick="window.location.href='/groups/create.html'" class="btn-create">Создать группу</button>
    </div>

    <div class="groups-stats">
        <span class="badge" id="groups-count">Вы состоите в 0 группах</span>
    </div>

    <div id="groups-list" class="groups-list"></div>

    <div class="empty-groups" id="empty-groups">
        <p>Вы пока не состоите ни в одной группе</p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadGroups);

    async function loadGroups() {
        const token = localStorage.getItem('access');
        const groupsList = document.getElementById('groups-list');
        const emptyGroups = document.getElementById('empty-groups');
        const countBadge = document.getElementById('groups-count');

        try {
            const response = await fetch('/api/groups', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (!response.ok) {
                throw new Error('Ошибка загрузки групп');
            }

            const groups = await response.json();
            countBadge.textContent = `Вы состоите в ${groups.length} группах`;

            if (groups.length === 0) {
                emptyGroups.style.display = 'block';
                return;
            }

            groups.forEach(group => {
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `
                    <div class="group-info">
                        <h5>${group.name}</h5>
                        <h6>Автор: ${group.author?.username || 'Неизвестен'}</h6>
                        <div class="group-actions">
                            <a href="/groups/detail.html?id=${group.id}">Перейти в группу</a>
                        </div>
                    </div>
                `;
                groupsList.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            groupsList.innerHTML = '<p style="color: red; text-align: center;">Не удалось загрузить список групп.</p>';
        }
    }
</script>
</body>
</html>
