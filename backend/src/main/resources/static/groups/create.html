<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание группы</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }

        .group-create-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .group-create-container h2 {
            color: #3498db;
            font-size: 28px;
            text-align: center;
            margin-bottom: 25px;
        }

        .group-create-container label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        .group-create-container input[type="text"],
        .group-create-container select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .group-create-container select {
            height: auto;
        }

        .group-create-container button[type="submit"] {
            background-color: #2ecc71;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: block;
            width: 100%;
        }

        .group-create-container button[type="submit"]:hover {
            background-color: rgb(30, 124, 69);
        }

        #response {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .btn-back {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            background-color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="group-create-container">
    <button onclick="history.back()" class="btn-back">← Назад</button>
    <h2>Создание группы</h2>

    <form id="group-create-form">
        <label for="name">Название группы:</label>
        <input type="text" id="name" name="name" required>

        <label for="members">Выберите участников:</label>
        <select id="members" name="members" multiple size="5"></select>

        <button type="submit">Создать</button>
    </form>

    <div id="response"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadFriends);

    async function loadFriends() {
        const token = localStorage.getItem('access');
        const select = document.getElementById('members');

        try {
            const response = await fetch('/api/users/friends', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const friends = await response.json();

            friends.forEach(friend => {
                const option = document.createElement('option');
                option.value = friend.id;
                option.textContent = friend.username;
                select.appendChild(option);
            });
        } catch (error) {
            console.error(error);
        }
    }

    document.getElementById('group-create-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const membersSelect = document.getElementById('members');
        const selectedMembers = Array.from(membersSelect.selectedOptions).map(opt => parseInt(opt.value));
        const token = localStorage.getItem('access');
        const responseDiv = document.getElementById('response');

        if (!name) return;

        try {
            const response = await fetch('/api/groups/create', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    memberIds: selectedMembers
                })
            });

            if (response.ok) {
                responseDiv.innerHTML = '<span style="color: green;">Группа успешно создана!</span>';
                setTimeout(() => window.location.href = '/auth/index.html', 1500);
            } else {
                const errorData = await response.json().catch(() => null);
                const errorMsg = errorData?.message || 'Ошибка создания группы';
                responseDiv.innerHTML = `<span style="color: red;">${errorMsg}</span>`;
            }
        } catch (error) {
            console.error(error);
            responseDiv.innerHTML = '<span style="color: red;">Произошла непредвиденная ошибка</span>';
        }
    });
</script>
</body>
</html>
